name: Format HuJSON

on:
  push:
    branches: ["main"]
    paths: ["**.hujson"]
  pull_request:
    branches: ["main"]
    paths: ["**.hujson"]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install hujsonfmt
        run: go install github.com/tailscale/hujson/cmd/hujsonfmt@latest

      - name: Check formatting
        run: |
          unformatted=$(hujsonfmt -l *.hujson)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'hujsonfmt -w' to format them:"
            hujsonfmt -d *.hujson
            exit 1
          fi
