name: Format HuJSON

on:
  push:
    branches: ["main"]
    paths: ["**.hujson"]
  pull_request:
    branches: ["main"]
    paths: ["**.hujson"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install hujsonfmt
        run: go install github.com/tailscale/hujson/cmd/hujsonfmt@latest

      - name: Check formatting
        if: github.event_name != 'workflow_dispatch'
        run: |
          unformatted=$(find . -name '*.hujson' -not -path './.git/*' -exec hujsonfmt -l {} +)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'hujsonfmt -w' to format them:"
            find . -name '*.hujson' -not -path './.git/*' -exec hujsonfmt -d {} +
            exit 1
          fi

      - name: Format files
        if: github.event_name == 'workflow_dispatch'
        run: find . -name '*.hujson' -not -path './.git/*' -exec hujsonfmt -w {} +

      - name: Commit changes
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: format hujson files"
          git push
