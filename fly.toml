app = 'vpn-ps'
primary_region = 'ams'
swap_size_mb = 256

[experimental]
  machine_config = 'cli-config.json'
  container = 'proxyt'

[mounts]
  source = "tailscale_data"
  destination = "/data"

[[restart]]
  policy = "always"

[[vm]]
  cpus = 1
  memory_mb = 256
  memory = '256mb'
  cpu_kind = 'shared'
  size = 'shared-cpu-1x'

[deploy]
  strategy = "immediate"
